<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Offline - Calendario Iglesia</title>
    <style>
        body {
            background-color: #0b1121;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #d4af37; }
        p { color: #ccc; }
        .btn {
            background: #d4af37;
            color: #0b1121;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Estás desconectado</h1>
    <p>Parece que no tienes conexión a internet en este momento.</p>
    <p>La aplicación cargará automáticamente cuando recuperes la señal.</p>
    <a href="." class="btn">Reintentar</a>
</body>
</html>
